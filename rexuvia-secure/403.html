<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .glitch {
    font-size: clamp(4rem, 12vw, 8rem);
    font-weight: 900;
    color: #e87461;
    letter-spacing: 0.1em;
    position: relative;
    animation: flicker 3s infinite;
  }
  .glitch::before, .glitch::after {
    content: '403';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .glitch::before {
    color: #ff6b6b;
    animation: glitch-1 0.3s infinite;
    clip-path: inset(20% 0 60% 0);
  }
  .glitch::after {
    color: #4ecdc4;
    animation: glitch-2 0.3s infinite;
    clip-path: inset(60% 0 10% 0);
  }
  @keyframes glitch-1 {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, 1px); }
    80% { transform: translate(2px, -1px); }
  }
  @keyframes glitch-2 {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(3px, -2px); }
    40% { transform: translate(-3px, 2px); }
    60% { transform: translate(2px, -1px); }
    80% { transform: translate(-2px, 1px); }
  }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  .message {
    margin-top: 24px;
    font-size: 0.85rem;
    color: #555;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .sub {
    margin-top: 12px;
    font-size: 0.7rem;
    color: #333;
    letter-spacing: 0.1em;
  }

  .noise {
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: transparent url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E") repeat;
    pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <div class="glitch">403</div>
  <div class="message">Access Denied</div>
  <div class="sub">This endpoint is not available from your network</div>
</div>
</body>
</html>
