<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --bg: #080810;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.12);
  --cyan: #00f0ff;
  --pink: #ff00aa;
  --green: #00ff88;
  --gold: #ffd700;
  --text: #e0e8f0;
  --muted: #8899aa;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden}

/* ─── LAYOUT ─── */
#app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;max-width:1200px;margin:0 auto;padding:0 12px}
@media(min-width:860px){#app{grid-template-columns:260px minmax(0, 1fr);grid-template-rows:auto 1fr;}}

/* ─── HEADER ─── */
#header{grid-column:1/-1;padding:14px 0 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}

/* ─── SIDEBAR ─── */
#sidebar{padding:12px 0 12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
@media(min-width:860px){#sidebar{padding:16px 16px 16px 0;border-right:1px solid var(--border);grid-column:1;grid-row:2}}

/* ─── CANVAS ZONE ─── */
#canvas-zone{display:flex;flex-direction:column;gap:10px;padding:12px 0}
@media(min-width:860px){#canvas-zone{padding:16px 0 16px 16px;height:100%;grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}}
#canvas-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;border:1px solid var(--border);box-shadow:0 0 40px rgba(0,240,255,.06);flex:1;min-height:300px;max-height:600px;aspect-ratio:1/1}
@media(min-width:860px){#canvas-wrap{aspect-ratio:1/1;max-height:min(600px, calc(100vh - 150px));max-width:min(600px, calc(100vh - 150px));width:auto;height:auto}}
#main-canvas{display:block;width:100%;height:100%;image-rendering:pixelated}

/* ─── STATUS BAR ─── */
#statusbar{grid-column:1/-1;border-top:1px solid var(--border);padding:6px 0;display:flex;gap:12px;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap}

/* Mock elements for testing */
.mock-sidebar-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.mock-button { background: linear-gradient(135deg, var(--pink), var(--cyan)); border: none; color: #000; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; }
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div>GLITCH LOOM</div>
    <div>Header Actions</div>
  </header>
  
  <aside id="sidebar">
    <div class="mock-sidebar-item">Presets Panel</div>
    <div class="mock-sidebar-item">Image Source Panel</div>
    <div class="mock-sidebar-item">Weave Controls</div>
    <div class="mock-sidebar-item">Pixel Sort Controls</div>
    <div class="mock-sidebar-item">Datamosh Controls</div>
    <div class="mock-sidebar-item">Animation Controls</div>
    <div class="mock-sidebar-item">Color Palette</div>
    <button class="mock-button">✦ Weave Glitch</button>
  </aside>
  
  <main id="canvas-zone">
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center;">
        Canvas Preview<br>
        (Would show glitch art here)
      </div>
    </div>
  </main>
  
  <footer id="statusbar">
    <span>Status: Ready</span>
    <div style="flex:1; background: var(--surface); border-radius: 1px; overflow: hidden; max-width: 200px;">
      <div style="height:2px; background: linear-gradient(90deg, var(--cyan), var(--pink)); width: 30%;"></div>
    </div>
    <span>Canvas: 600×600</span>
  </footer>
</div>

<script>
// Set canvas size for testing
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 600;

// Draw a test pattern
ctx.fillStyle = '#0a192f';
ctx.fillRect(0, 0, 600, 600);
ctx.fillStyle = '#00f0ff';
ctx.font = '20px monospace';
ctx.textAlign = 'center';
ctx.fillText('Glitch Loom Canvas', 300, 300);
ctx.font = '14px monospace';
ctx.fillText('Fixed size: max 600×600', 300, 330);
</script>
</body>
</html>
